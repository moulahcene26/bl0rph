<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bl0rph blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 fill=%22%23111%22/><rect x=%223%22 y=%223%22 width=%2210%22 height=%2210%22 fill=%22%23e5342a%22/></svg>">
  <script>
    // legacy route: /post.html?p=<slug> now lives at /posts/<slug>/
    (function () {
      var slug = new URLSearchParams(location.search).get("p") || "";
      location.replace(/^[a-z0-9-]+$/i.test(slug) ? "posts/" + slug + "/" : "./");
    })();
  </script>
</head>
<body>
  <div class="sheet" style="max-width:40rem;margin:0 auto;padding:3rem 1.25rem">
    <p>redirecting&hellip; if nothing happens, <a href="./">go to the blog</a>.</p>
  </div>
</body>
</html>
